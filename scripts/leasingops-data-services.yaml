---
# Standalone PostgreSQL 15 deployment for NeIO LeasingOps.
# Uses credentials from neio-leasingops-secrets so they stay aligned with
# what the API and worker pods read.
apiVersion: v1
kind: Service
metadata:
  name: neio-leasingops-postgresql
  namespace: leasingops
  labels:
    app: postgresql
spec:
  selector:
    app: postgresql
  ports:
    - name: pg
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: leasingops
  labels:
    app: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgres
          image: docker.io/library/postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: neio-leasingops-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neio-leasingops-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: leasingops
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "leasingops", "-d", "leasingops"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
      volumes:
        - name: data
          emptyDir: {}
---
# Standalone Redis 7 deployment. Service name `redis` matches the chart's
# default REDIS_HOST fallback so no values override is needed.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: leasingops
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: leasingops
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: docker.io/library/redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["sh", "-c"]
          args:
            - 'exec redis-server --requirepass "$REDIS_PASSWORD" --save "" --appendonly no'
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neio-leasingops-secrets
                  key: REDIS_PASSWORD
          readinessProbe:
            exec:
              command: ["sh", "-c", 'redis-cli -a "$REDIS_PASSWORD" ping']
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

# Example SealedSecret manifest shape for neio-leasingops-secrets.
#
# This file shows what the output of `kubeseal -f neio-leasingops-secrets.yaml -w sealed-secret.yaml`
# looks like. The `encryptedData` values are placeholders. They are encrypted against
# the Sealed Secrets controller's public key, which is unique per cluster, so a
# kubeseal output is only valid for the cluster it was sealed against.
#
# To produce your real SealedSecret:
#
#   1. Write a regular Secret YAML locally (DO NOT commit it).
#   2. Run: kubeseal --format yaml -f your-secret.yaml > sealed-secret.yaml
#   3. Wipe the plaintext file. The sealed-secret.yaml is safe to commit and apply.
#
# Once you `oc apply -f sealed-secret.yaml`, the Sealed Secrets controller
# decrypts and writes `Secret/neio-leasingops-secrets` into the namespace.
# The chart's api / worker pods then mount it as documented in step 5 of the README.

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: neio-leasingops-secrets
  namespace: leasingops
spec:
  encryptedData:
    POSTGRES_USER: AgB...<base64 ciphertext from kubeseal>...==
    POSTGRES_PASSWORD: AgC...<base64 ciphertext from kubeseal>...==
    REDIS_PASSWORD: AgD...<base64 ciphertext from kubeseal>...==
    JWT_SECRET_KEY: AgE...<base64 ciphertext from kubeseal>...==
    ANTHROPIC_API_KEY: AgF...<base64 ciphertext from kubeseal>...==
  template:
    metadata:
      name: neio-leasingops-secrets
      namespace: leasingops
    type: Opaque

# Example ArgoCD Application that deploys the NeIO LeasingOps quickstart.
#
# This is what Red Hat Demo Platform (RHDP) or an internal GitOps repo
# would apply to provision a partner instance. ArgoCD pulls the chart
# from this repo at the pinned ref, renders it with the parameters
# below, and applies the manifests into the destination namespace.
#
# Before applying this Application, the cluster needs:
#   - The leasingops namespace (the Application creates it via
#     CreateNamespace=true).
#   - acr-pull-secret and neio-leasingops-secrets in that namespace.
#     Ship both as SealedSecrets in your GitOps repo; see the README
#     Appendix C and examples/sealed-secret.example.yaml.
#   - vLLM and LlamaStack deployed in the same namespace (separate
#     ArgoCD Applications using rh-ai-quickstart/llm-service and
#     rh-ai-quickstart/llama-stack with the values from README step 2).
#
# This chart deploys its own PostgreSQL and Redis, the ServiceAccount,
# the SCC binding, and the model-registration job — so this single
# Application stands up the whole application tier. The two model-server
# Applications above are its only siblings in an App-of-Apps layout.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: neio-leasingops
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/rh-ai-quickstart/Agentic-Lease-Management-and-Reconciliation-with-Codvo
    targetRevision: main
    path: leasingops/helm
    helm:
      releaseName: neio-leasingops
      valueFiles:
        - values.yaml
        - values-openshift.yaml
      parameters:
        - name: global.imagePullSecrets[0]
          value: acr-pull-secret
        - name: api.image.repository
          value: rhleasingopsacr.azurecr.io/leasingops-api
        - name: api.image.tag
          value: "20260615.01.0001"
        - name: app.image.repository
          value: rhleasingopsacr.azurecr.io/leasingops-app
        - name: app.image.tag
          value: "20260615.01.0001"
        - name: worker.image.repository
          value: rhleasingopsacr.azurecr.io/leasingops-worker
        - name: worker.image.tag
          value: "20260615.01.0001"
        - name: llamastack.url
          value: http://llamastack:8321
        - name: llamastack.model
          value: remote-llm/ibm-granite/granite-3.3-2b-instruct
        - name: llamastack.maxTokens
          value: "2048"
        # Replace with your cluster's apps domain
        # (oc get ingress.config.openshift.io cluster -o jsonpath='{.spec.domain}').
        - name: api.route.host
          value: api-leasingops.apps.YOUR-CLUSTER-DOMAIN
        - name: app.route.host
          value: leasingops.apps.YOUR-CLUSTER-DOMAIN

  destination:
    server: https://kubernetes.default.svc
    namespace: leasingops

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 3m
        factor: 2

apiVersion: v2
name: neio-leasingops
version: 1.0.1
appVersion: "1.0.0"
description: NeIO LeasingOps - AI-powered Aircraft Leasing Operations Platform
type: application

keywords:
  - ai
  - leasingops
  - aircraft-leasing
  - openshift
  - red-hat
  - neio
  - enterprise-ai
  - llm
  - rag

home: https://codvo.ai/leasingops
sources:
  - https://github.com/codvo-ai/neio-leasingops

maintainers:
  - name: CODVO.AI
    email: support@codvo.ai
    url: https://codvo.ai

annotations:
  # OpenShift certification
  openshift.io/provider-display-name: CODVO.AI
  com.redhat.openshift.versions: "v4.12-v4.15"
  com.redhat.delivery.operator.bundle: "true"
  com.redhat.delivery.backport: "false"

  # Artifact Hub annotations
  artifacthub.io/category: ai-machine-learning
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/containsSecurityUpdates: "false"

# No subchart dependencies. PostgreSQL and Redis are deployed by this
# chart's own templates (templates/postgresql.yaml, templates/redis.yaml),
# gated on database.deployInCluster / cache.deployInCluster. The Bitnami
# subcharts were removed: they do not run cleanly on OpenShift
# restricted-v2 SCC, and shipping them meant a `helm dependency build`
# step plus a docs contradiction. For an external managed database, set
# database.deployInCluster=false and point database.external.host at it.

kubeVersion: ">=1.25.0-0"

icon: https://codvo.ai/assets/leasingops-icon.png

apiVersion: v2
name: neio-leasingops
version: 1.1.0
appVersion: "1.0.0"
description: NeIO LeasingOps - AI-powered Aircraft Leasing Operations Platform
type: application

keywords:
  - ai
  - leasingops
  - aircraft-leasing
  - openshift
  - red-hat
  - neio
  - enterprise-ai
  - llm
  - rag

home: https://codvo.ai/leasingops
sources:
  - https://github.com/codvo-ai/neio-leasingops

maintainers:
  - name: CODVO.AI
    email: support@codvo.ai
    url: https://codvo.ai

annotations:
  # OpenShift certification
  openshift.io/provider-display-name: CODVO.AI
  com.redhat.openshift.versions: "v4.12-v4.15"
  com.redhat.delivery.operator.bundle: "true"
  com.redhat.delivery.backport: "false"

  # Artifact Hub annotations
  artifacthub.io/category: ai-machine-learning
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/containsSecurityUpdates: "false"

# Subchart dependencies: the Red Hat AI Architecture charts that serve the model.
# Folding these in lets a single `helm install` bring up the model server
# (vLLM via llm-service, plus LlamaStack) alongside the application — one command
# instead of separate model-server installs.
#
# PostgreSQL and Redis are still deployed by this chart's OWN templates
# (templates/postgresql.yaml, templates/redis.yaml), gated on
# database.deployInCluster / cache.deployInCluster — deliberately NOT subcharts,
# because the Bitnami charts do not run cleanly on OpenShift restricted-v2 SCC.
# For an external managed database, set database.deployInCluster=false and point
# database.external.host at it.
#
# Both subcharts are gated on their <name>.enabled value, so an air-gapped or
# bring-your-own-model deployment can disable them and point llamastack.url at an
# existing endpoint.
dependencies:
  - name: llm-service
    version: 0.5.9
    repository: https://rh-ai-quickstart.github.io/ai-architecture-charts
    condition: llm-service.enabled
  - name: llama-stack
    version: 0.7.3
    repository: https://rh-ai-quickstart.github.io/ai-architecture-charts
    condition: llama-stack.enabled

kubeVersion: ">=1.25.0-0"

icon: https://codvo.ai/assets/leasingops-icon.png

# NeIO LeasingOps - OpenShift-Specific Values
# Use with: helm install -f values.yaml -f values-openshift.yaml

# =============================================================================
# GLOBAL OPENSHIFT SETTINGS
# =============================================================================
global:
  # Enable OpenShift-specific features
  openshift:
    enabled: true
    route:
      enabled: true
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect

  # OpenShift restricted SCC compatible security context
  # Reference: https://docs.openshift.com/container-platform/4.14/authentication/managing-security-context-constraints.html
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

# =============================================================================
# APPLICATION FRONTEND - OpenShift Configuration
# =============================================================================
app:
  # The uploads PVC is ReadWriteOnce. A second replica scheduled to a
  # different node sits in ContainerCreating forever. Keep replicas: 1
  # unless your cluster has an RWX storage class.
  replicaCount: 1
  replicas: 1

  # Validated application image (proprietary, pulled from ACR via the pull secret).
  image:
    repository: rhleasingopsacr.azurecr.io/leasingops-app
    tag: "20260615.01.0001"

  # OpenShift Route configuration
  route:
    enabled: true
    # Empty host -> OpenShift auto-assigns <name>-<namespace>.<apps-domain>, so no
    # cluster-specific overrides file is needed.
    host: ""
    path: /
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
    annotations:
      # OpenShift route annotations
      haproxy.router.openshift.io/timeout: 60s
      haproxy.router.openshift.io/balance: roundrobin
      router.openshift.io/cookie-same-site: Strict
      router.openshift.io/cookie_name: leasingops-app

  # Disable Kubernetes Ingress (using OpenShift Routes instead)
  ingress:
    enabled: false

  # Next.js doesn't serve /api/health. Root path passes.
  livenessProbe:
    path: /
  readinessProbe:
    path: /

  # Pod-level security context. fsGroup 1000 lets appuser (image's USER)
  # write to the shared uploads PVC. runAsUser/runAsGroup are left to
  # OpenShift's SCC controller to assign from the namespace range.
  podSecurityContext:
    fsGroup: 1000

  # Container-level security context.
  # Field name must be `securityContext`; the deployment template reads
  # .Values.app.securityContext. We deliberately leave it sparse so the
  # OpenShift SCC controller fills in the rest. Setting seccompProfile
  # here triggers an admission webhook that converts it to a forbidden
  # deprecated annotation on restricted-v2 SCC.
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  # Keep the ROSA/OpenShift AI quickstart small enough to fit on a
  # three-node m6i.xlarge demo cluster. Raise these for production.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# =============================================================================
# API SERVER - OpenShift Configuration
# =============================================================================
api:
  # See note on app.replicas. The uploads PVC is RWO.
  replicas: 1

  # Validated API image (proprietary, pulled from ACR via the pull secret).
  image:
    repository: rhleasingopsacr.azurecr.io/leasingops-api
    tag: "20260615.01.0001"

  # OpenShift Route configuration
  route:
    enabled: true
    # Empty host -> OpenShift auto-assigns the route hostname.
    host: ""
    path: /
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
    annotations:
      haproxy.router.openshift.io/timeout: 120s
      haproxy.router.openshift.io/balance: roundrobin
      # Enable WebSocket support for streaming responses
      haproxy.router.openshift.io/hsts_header: max-age=31536000;includeSubDomains

  # Probes match the actual API health endpoint (FastAPI /health).
  livenessProbe:
    path: /health
  readinessProbe:
    path: /health

  podSecurityContext:
    fsGroup: 1000

  # See note on app.securityContext above.
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  # Conservative demo requests. OpenShift AI operators consume most
  # schedulable CPU on small ROSA clusters even when actual CPU is idle.
  resources:
    requests:
      cpu: 10m
      memory: 512Mi
    limits:
      cpu: 750m
      memory: 1Gi

  # Environment variables for OpenShift
  env:
    # Inherit from base values.yaml
    ENVIRONMENT: production
    LOG_LEVEL: info

    # OpenShift-specific settings
    OPENSHIFT_ENABLED: "true"

    # Trust OpenShift router headers
    FORWARDED_ALLOW_IPS: "*"
    PROXY_HEADERS: "true"

# =============================================================================
# BACKGROUND WORKER - OpenShift Configuration
# =============================================================================
worker:
  # Validated worker image (proprietary, pulled from ACR via the pull secret).
  image:
    repository: rhleasingopsacr.azurecr.io/leasingops-worker
    tag: "20260615.01.0001"

  # The validated worker image ships bytecode-only sources, including
  # /app/worker.pyc. The base chart's source-file command is kept for
  # source-built images; OpenShift quickstart uses the packaged bytecode.
  command:
    - python
    - /app/worker.pyc

  podSecurityContext:
    fsGroup: 1000

  # See note on app.securityContext above.
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  # The API and worker both mount leasingops-uploads, which is an AWS EBS
  # ReadWriteOnce PVC in ROSA. Co-locate the worker with the API so the
  # single volume can attach successfully.
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - api
          topologyKey: kubernetes.io/hostname

  resources:
    requests:
      cpu: 10m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

# =============================================================================
# MODEL SERVER - cost-sensitive OpenShift/ROSA demo profile
# =============================================================================
llm-service:
  enabled: true
  # Prefer CPU for the portable quickstart. It is slower than GPU but avoids
  # requiring a GPU machine pool for meeting demos and short-lived clusters.
  device: cpu
  models:
    granite-3-3-2b-instruct:
      id: ibm-granite/granite-3.3-2b-instruct
      enabled: true
      device: cpu
      resources:
        requests:
          cpu: "2"
          memory: 8Gi
        limits:
          cpu: "4"
          memory: 16Gi
      args:
        - --max-model-len
        - "8192"

# =============================================================================
# AI CONFIGURATION - OpenShift AI Integration
# =============================================================================
ai:
  # Enable OpenShift AI as primary provider
  provider: openshift-ai

  # OpenShift AI / Red Hat OpenShift AI (RHOAI) integration
  openshiftAI:
    enabled: true
    # KServe/ModelMesh serving runtime endpoint
    # This will be auto-discovered from InferenceService if not specified
    endpoint: ""
    # Model name deployed via OpenShift AI Model Serving
    modelName: "llama-3.1-8b-instruct"
    # InferenceService name (if using KServe)
    inferenceServiceName: "leasingops-llm"
    # Namespace where model is deployed (defaults to same namespace)
    namespace: ""
    # Authentication for model endpoint
    auth:
      enabled: true
      # ServiceAccount token authentication
      serviceAccountToken: true
      # Or use bearer token from secret
      existingSecret: ""
      existingSecretKey: model-api-key
    # Model serving configuration
    serving:
      # Runtime: vllm, tgis, caikit
      runtime: vllm
      # GPU resources
      resources:
        requests:
          nvidia.com/gpu: "1"
        limits:
          nvidia.com/gpu: "1"

  # Disable external Claude API when using OpenShift AI
  claude:
    enabled: false

  # Embeddings - use local model for air-gapped compatibility
  embeddings:
    provider: local
    model: sentence-transformers/all-MiniLM-L6-v2
    dimension: 384

    local:
      enabled: true
      # Can also use OpenShift AI for embeddings
      openshiftAI:
        enabled: false
        inferenceServiceName: "leasingops-embeddings"

# =============================================================================
# DATABASE - OpenShift Configuration
# =============================================================================
database:
  # For OpenShift, typically use external managed database
  # such as Amazon RDS, Azure Database, or Crunchy PostgreSQL Operator
  external:
    enabled: true
    # Connection via OpenShift Service binding
    serviceBinding:
      enabled: false
      serviceName: ""

  internal:
    enabled: false

# =============================================================================
# VECTOR STORE - OpenShift Configuration
# =============================================================================
vectorStore:
  provider: pgvector

  pgvector:
    enabled: true

# =============================================================================
# OBJECT STORAGE - OpenShift Configuration
# =============================================================================
storage:
  # For OpenShift, prefer OpenShift Data Foundation (ODF) or external S3
  provider: s3

  # MinIO can run on OpenShift with proper SCC
  minio:
    enabled: false
    internal:
      enabled: false
      # Security context for MinIO on OpenShift
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000

  # AWS S3 or S3-compatible (like ODF ObjectBucketClaim)
  s3:
    enabled: true
    # For ODF ObjectBucketClaim, these are auto-populated
    region: ""
    bucket: leasingops-documents
    # Use secret binding from ObjectBucketClaim
    existingSecret: leasingops-bucket-credentials
    existingSecretAccessKeyId: AWS_ACCESS_KEY_ID
    existingSecretSecretKey: AWS_SECRET_ACCESS_KEY

# =============================================================================
# CACHE - OpenShift Configuration
# =============================================================================
cache:
  internal:
    enabled: true
    # Security context for Redis on OpenShift
    securityContext:
      runAsNonRoot: true
      fsGroup: 1000

# =============================================================================
# AUTHENTICATION - OpenShift OAuth Integration
# =============================================================================
auth:
  # Can integrate with OpenShift OAuth
  provider: keycloak

  # Red Hat SSO (Keycloak) integration
  keycloak:
    enabled: true
    # Use Red Hat SSO Operator
    operator:
      enabled: false
      realm: leasingops

# =============================================================================
# MONITORING - OpenShift Observability
# =============================================================================
monitoring:
  prometheus:
    enabled: true
    # Use OpenShift User Workload Monitoring
    serviceMonitor:
      enabled: true
      # OpenShift monitoring namespace
      namespace: openshift-user-workload-monitoring
      interval: 30s
      scrapeTimeout: 10s
      # Labels required by OpenShift monitoring
      labels:
        app.kubernetes.io/part-of: neio-leasingops

# =============================================================================
# NETWORK POLICIES - OpenShift Configuration
# =============================================================================
networkPolicies:
  enabled: true

  # Allow ingress from OpenShift router and monitoring
  allowedNamespaces:
    - openshift-ingress
    - openshift-monitoring
    - openshift-user-workload-monitoring

# =============================================================================
# SECURITY - OpenShift Configuration
# =============================================================================
security:
  # OpenShift uses SCCs instead of PSP
  podSecurityStandards:
    enforce: restricted

  # Service account for workload identity.
  # If you need AWS IRSA on ROSA, add eks.amazonaws.com/role-arn under annotations.
  # If you need Azure Workload Identity on ARO, add azure.workload.identity/client-id.
  serviceAccount:
    create: true
    annotations: {}

  # RBAC is managed differently in OpenShift
  rbac:
    create: true
    # Additional cluster role bindings for OpenShift
    clusterRoleBindings:
      - name: leasingops-scc-restricted
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: system:openshift:scc:restricted-v2

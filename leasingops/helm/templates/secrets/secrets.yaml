{{- $secretsCreate := false }}
{{- if .Values.secrets }}
{{- $secretsCreate = .Values.secrets.create }}
{{- else if and .Values.security .Values.security.secrets }}
{{- $secretsCreate = .Values.security.secrets.create }}
{{- end }}
{{- if $secretsCreate }}
# =============================================================================
# Sealed Secrets Template for NeIO LeasingOps
# =============================================================================
# This template supports two modes:
# 1. Regular Kubernetes Secret (for development/testing)
# 2. Bitnami Sealed Secrets (for production - encrypted at rest)
#
# For production, use kubeseal to encrypt secrets:
#   kubeseal --format yaml --cert sealed-secrets-cert.pem < secret.yaml > sealed-secret.yaml
# =============================================================================

{{- $secretsSealed := false }}
{{- if and .Values.secrets .Values.secrets.sealed }}
{{- $secretsSealed = .Values.secrets.sealed }}
{{- end }}
{{- if $secretsSealed }}
# Production: Use Bitnami Sealed Secrets
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "neio-leasingops.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neio-leasingops.labels" . | nindent 4 }}
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
    sealedsecrets.bitnami.com/namespace-wide: "false"
spec:
  encryptedData:
    # ==========================================================================
    # Database Credentials
    # ==========================================================================
    # These values must be pre-encrypted using kubeseal
    POSTGRES_USER: {{ .Values.secrets.sealedData.POSTGRES_USER | required "secrets.sealedData.POSTGRES_USER is required for sealed secrets" }}
    POSTGRES_PASSWORD: {{ .Values.secrets.sealedData.POSTGRES_PASSWORD | required "secrets.sealedData.POSTGRES_PASSWORD is required for sealed secrets" }}

    # ==========================================================================
    # Redis Password (optional)
    # ==========================================================================
    {{- if .Values.secrets.sealedData.REDIS_PASSWORD }}
    REDIS_PASSWORD: {{ .Values.secrets.sealedData.REDIS_PASSWORD }}
    {{- end }}

    # ==========================================================================
    # Vector Store API Key (optional)
    # ==========================================================================
    {{- if .Values.secrets.sealedData.QDRANT_API_KEY }}
    QDRANT_API_KEY: {{ .Values.secrets.sealedData.QDRANT_API_KEY }}
    {{- end }}

    # ==========================================================================
    # AI/LLM API Keys
    # ==========================================================================
    ANTHROPIC_API_KEY: {{ .Values.secrets.sealedData.ANTHROPIC_API_KEY | required "secrets.sealedData.ANTHROPIC_API_KEY is required for sealed secrets" }}
    {{- if .Values.secrets.sealedData.OPENAI_API_KEY }}
    OPENAI_API_KEY: {{ .Values.secrets.sealedData.OPENAI_API_KEY }}
    {{- end }}
    {{- if .Values.secrets.sealedData.VOYAGE_API_KEY }}
    VOYAGE_API_KEY: {{ .Values.secrets.sealedData.VOYAGE_API_KEY }}
    {{- end }}

    # ==========================================================================
    # JWT/Authentication Secrets
    # ==========================================================================
    JWT_SECRET_KEY: {{ .Values.secrets.sealedData.JWT_SECRET_KEY | required "secrets.sealedData.JWT_SECRET_KEY is required for sealed secrets" }}
    {{- if .Values.secrets.sealedData.JWT_REFRESH_SECRET_KEY }}
    JWT_REFRESH_SECRET_KEY: {{ .Values.secrets.sealedData.JWT_REFRESH_SECRET_KEY }}
    {{- end }}

    # ==========================================================================
    # Observability (optional)
    # ==========================================================================
    {{- if .Values.secrets.sealedData.LANGFUSE_PUBLIC_KEY }}
    LANGFUSE_PUBLIC_KEY: {{ .Values.secrets.sealedData.LANGFUSE_PUBLIC_KEY }}
    {{- end }}
    {{- if .Values.secrets.sealedData.LANGFUSE_SECRET_KEY }}
    LANGFUSE_SECRET_KEY: {{ .Values.secrets.sealedData.LANGFUSE_SECRET_KEY }}
    {{- end }}

    # ==========================================================================
    # Additional Secrets
    # ==========================================================================
    {{- range $key, $value := .Values.secrets.sealedData.extra }}
    {{ $key }}: {{ $value }}
    {{- end }}
  template:
    metadata:
      name: {{ include "neio-leasingops.fullname" . }}-secrets
      namespace: {{ .Release.Namespace }}
      labels:
        {{- include "neio-leasingops.labels" . | nindent 8 }}
    type: Opaque

{{- else }}
# Development/Testing: Regular Kubernetes Secret
# WARNING: Do NOT use this in production. Use Sealed Secrets instead.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "neio-leasingops.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neio-leasingops.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # ==========================================================================
  # Database Credentials
  # ==========================================================================
  POSTGRES_USER: {{ .Values.secrets.data.POSTGRES_USER | default "leasingops" | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.data.POSTGRES_PASSWORD | required "secrets.data.POSTGRES_PASSWORD is required" | quote }}

  # ==========================================================================
  # Redis Password (optional)
  # ==========================================================================
  {{- if .Values.secrets.data.REDIS_PASSWORD }}
  REDIS_PASSWORD: {{ .Values.secrets.data.REDIS_PASSWORD | quote }}
  {{- end }}

  # ==========================================================================
  # Vector Store API Key (optional for self-hosted Qdrant)
  # ==========================================================================
  {{- if .Values.secrets.data.QDRANT_API_KEY }}
  QDRANT_API_KEY: {{ .Values.secrets.data.QDRANT_API_KEY | quote }}
  {{- end }}

  # ==========================================================================
  # AI/LLM API Keys
  # ==========================================================================
  ANTHROPIC_API_KEY: {{ .Values.secrets.data.ANTHROPIC_API_KEY | required "secrets.data.ANTHROPIC_API_KEY is required" | quote }}
  {{- if .Values.secrets.data.OPENAI_API_KEY }}
  OPENAI_API_KEY: {{ .Values.secrets.data.OPENAI_API_KEY | quote }}
  {{- end }}
  {{- if .Values.secrets.data.VOYAGE_API_KEY }}
  VOYAGE_API_KEY: {{ .Values.secrets.data.VOYAGE_API_KEY | quote }}
  {{- end }}

  # ==========================================================================
  # JWT/Authentication Secrets
  # ==========================================================================
  # Must be a strong, randomly generated string (64+ characters recommended)
  JWT_SECRET_KEY: {{ .Values.secrets.data.JWT_SECRET_KEY | required "secrets.data.JWT_SECRET_KEY is required" | quote }}
  {{- if .Values.secrets.data.JWT_REFRESH_SECRET_KEY }}
  JWT_REFRESH_SECRET_KEY: {{ .Values.secrets.data.JWT_REFRESH_SECRET_KEY | quote }}
  {{- end }}

  # ==========================================================================
  # Observability (optional)
  # ==========================================================================
  {{- if .Values.secrets.data.LANGFUSE_PUBLIC_KEY }}
  LANGFUSE_PUBLIC_KEY: {{ .Values.secrets.data.LANGFUSE_PUBLIC_KEY | quote }}
  {{- end }}
  {{- if .Values.secrets.data.LANGFUSE_SECRET_KEY }}
  LANGFUSE_SECRET_KEY: {{ .Values.secrets.data.LANGFUSE_SECRET_KEY | quote }}
  {{- end }}

  # ==========================================================================
  # Additional Secrets
  # ==========================================================================
  {{- range $key, $value := .Values.secrets.data.extra }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- end }}
---
{{- if and .Values.secrets .Values.secrets.imagePullSecret .Values.secrets.imagePullSecret.create }}
# Image Pull Secret for private container registries
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "neio-leasingops.fullname" . }}-registry
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neio-leasingops.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.secrets.imagePullSecret.dockerConfigJson | required "secrets.imagePullSecret.dockerConfigJson is required when imagePullSecret.create is true" }}
{{- end }}

{{- if and .Values.imageCredentials .Values.imageCredentials.create }}
# Image pull secret for the proprietary application images (ACR).
# Built from imageCredentials.{registry,username,password} so the whole secret
# can be passed on a single `helm install` (or by RHDP as install parameters),
# rather than created out of band. Referenced via global.imagePullSecrets.
{{- $reg := .Values.imageCredentials.registry | default "rhleasingopsacr.azurecr.io" }}
{{- $user := .Values.imageCredentials.username | required "imageCredentials.username is required when imageCredentials.create=true (pass --set imageCredentials.username=...)" }}
{{- $pass := .Values.imageCredentials.password | required "imageCredentials.password is required when imageCredentials.create=true (pass --set imageCredentials.password=...)" }}
{{- $auth := printf "%s:%s" $user $pass | b64enc }}
{{- $dockerconfig := printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" $reg $user $pass $auth }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.imageCredentials.name | default "acr-pull-secret" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neio-leasingops.labels" . | nindent 4 }}
    app.kubernetes.io/component: pull-secret
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $dockerconfig | b64enc }}
{{- end }}

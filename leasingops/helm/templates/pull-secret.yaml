{{- if and .Values.imageCredentials .Values.imageCredentials.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.imageCredentials.name | default "quay-pull-secret" }}
  namespace: {{ ((.Values.namespace).name) | default .Release.Namespace }}
  labels:
    {{- include "neio-leasingops.labels" . | nindent 4 }}
    app.kubernetes.io/component: pull-secret
type: kubernetes.io/dockerconfigjson
data:
  # Base64 encoded Docker config JSON for Quay.io
  # Generate with: kubectl create secret docker-registry quay-pull-secret \
  #   --docker-server=quay.io \
  #   --docker-username=<username> \
  #   --docker-password=<password> \
  #   --docker-email=<email> \
  #   --dry-run=client -o jsonpath='{.data.\.dockerconfigjson}'
  .dockerconfigjson: {{ .Values.imageCredentials.dockerconfigjson | default "REPLACE_WITH_BASE64_ENCODED_DOCKERCONFIGJSON" }}
{{- end }}

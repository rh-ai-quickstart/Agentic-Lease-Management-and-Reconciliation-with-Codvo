{{- /*
ServiceAccount the chart references in api / worker / app deployments.

Without this, OpenShift's replicaset-controller stalls with:
  pods "neio-leasingops-..." is forbidden: error looking up service account
  leasingops/neio-leasingops: serviceaccount "neio-leasingops" not found
*/}}
{{- $saCreate := false }}
{{- if .Values.serviceAccount }}
{{- $saCreate = .Values.serviceAccount.create }}
{{- else if and .Values.security .Values.security.serviceAccount }}
{{- $saCreate = .Values.security.serviceAccount.create }}
{{- end }}
{{- if $saCreate }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "neio-leasingops.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neio-leasingops.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
{{- include "neio-leasingops.imagePullSecrets" . | nindent 0 }}
{{- end }}

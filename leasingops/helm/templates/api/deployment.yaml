{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "neio-leasingops.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neio-leasingops.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  annotations:
    app.openshift.io/connects-to: '[{"apiVersion":"apps/v1","kind":"Deployment","name":"{{ include "neio-leasingops.fullname" . }}-worker"}]'
spec:
  {{- if not (and .Values.api.autoscaling .Values.api.autoscaling.enabled) }}
  replicas: {{ .Values.api.replicas | default .Values.api.replicaCount | default 2 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "neio-leasingops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "neio-leasingops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/api/configmap.yaml") . | sha256sum }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets/secrets.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "neio-leasingops.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          securityContext:
            {{- toYaml .Values.api.securityContext | nindent 12 }}
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # Application Configuration
            - name: UIP_SOLUTIONS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-api-config
                  key: UIP_SOLUTIONS
            - name: ENVIRONMENT
              value: {{ .Values.global.environment | default "production" | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.api.logLevel | default "INFO" | quote }}

            # Database Configuration
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-api-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-api-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-api-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-secrets
                  key: POSTGRES_PASSWORD

            # Redis Configuration
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-api-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-api-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-secrets
                  key: REDIS_PASSWORD
                  optional: true

            # Vector Store Configuration
            - name: QDRANT_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-api-config
                  key: QDRANT_HOST
            - name: QDRANT_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-api-config
                  key: QDRANT_PORT
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-secrets
                  key: QDRANT_API_KEY
                  optional: true

            # RSDP LLM Configuration (llm.url / llm.apiToken / llm.model injected by RSDP)
            {{- if and .Values.llm .Values.llm.url }}
            - name: LLM_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-api-config
                  key: LLM_URL
            - name: LLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-api-config
                  key: LLM_MODEL
            - name: LLM_MAX_TOKENS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-api-config
                  key: LLM_MAX_TOKENS
            - name: LLM_TEMPERATURE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-api-config
                  key: LLM_TEMPERATURE
            - name: LLM_API_PATH
              valueFrom:
                configMapKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-api-config
                  key: LLM_API_PATH
            {{- end }}
            {{- if and .Values.llm .Values.llm.apiToken }}
            - name: LLM_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-llm-token
                  key: LLM_API_TOKEN
            {{- end }}

            # AI/LLM Configuration
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-secrets
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: VOYAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-secrets
                  key: VOYAGE_API_KEY
                  optional: true

            # OpenShift AI Configuration
            - name: OPENSHIFT_AI_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-api-config
                  key: OPENSHIFT_AI_ENABLED
            - name: OPENSHIFT_AI_INFERENCE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-api-config
                  key: OPENSHIFT_AI_INFERENCE_URL
                  optional: true
            - name: OPENSHIFT_AI_MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-api-config
                  key: OPENSHIFT_AI_MODEL_NAME
                  optional: true

            # Security
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "neio-leasingops.fullname" . }}-secrets
                  key: JWT_SECRET_KEY
            - name: JWT_ALGORITHM
              value: {{ ((.Values.security).jwt).algorithm | default ((.Values.api).env).JWT_ALGORITHM | default "HS256" | quote }}
            - name: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
              value: {{ ((.Values.security).jwt).accessTokenExpireMinutes | default ((.Values.api).env).JWT_EXPIRATION_HOURS | default "30" | quote }}

            # Feature Flags
            {{- range $key, $value := .Values.featureFlags }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.api.livenessProbe.initialDelaySeconds | default 30 }}
            periodSeconds: {{ .Values.api.livenessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.api.livenessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.api.livenessProbe.failureThreshold | default 3 }}

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.api.readinessProbe.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.api.readinessProbe.periodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.api.readinessProbe.timeoutSeconds | default 3 }}
            failureThreshold: {{ .Values.api.readinessProbe.failureThreshold | default 3 }}

          resources:
            limits:
              cpu: {{ .Values.api.resources.limits.cpu | default "2" | quote }}
              memory: {{ .Values.api.resources.limits.memory | default "2Gi" | quote }}
            requests:
              cpu: {{ .Values.api.resources.requests.cpu | default "500m" | quote }}
              memory: {{ .Values.api.resources.requests.memory | default "1Gi" | quote }}

          volumeMounts:
            - name: config-volume
              mountPath: /app/config
              readOnly: true
            - name: tmp-volume
              mountPath: /tmp
            {{- if .Values.api.extraVolumeMounts }}
            {{- toYaml .Values.api.extraVolumeMounts | nindent 12 }}
            {{- end }}

      volumes:
        - name: config-volume
          configMap:
            name: {{ include "neio-leasingops.fullname" . }}-api-config
        - name: tmp-volume
          emptyDir: {}
        {{- if .Values.api.extraVolumes }}
        {{- toYaml .Values.api.extraVolumes | nindent 8 }}
        {{- end }}

      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- if and .Values.api.autoscaling .Values.api.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "neio-leasingops.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neio-leasingops.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "neio-leasingops.fullname" . }}-api
  minReplicas: {{ .Values.api.autoscaling.minReplicas | default 2 }}
  maxReplicas: {{ .Values.api.autoscaling.maxReplicas | default 4 }}
  metrics:
    {{- if .Values.api.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.api.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
{{- end }}
{{- end }}

# Default values for Redis
replicaCount: 1

image:
  repository: redis
  tag: 7.2-alpine
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Redis configuration
redis:
  # Password authentication (leave empty to disable)
  password: ""
  # Existing secret with redis-password key
  existingSecret: ""
  # Maximum memory limit
  maxmemory: 256mb
  # Eviction policy when max memory is reached
  maxmemoryPolicy: allkeys-lru
  # Append only file for persistence
  appendonly: "yes"
  # Additional redis.conf settings
  extraConfig: ""

# Service configuration
service:
  type: ClusterIP
  port: 6379
  annotations: {}

# Persistence configuration
persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  annotations: {}

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Pod security context
podSecurityContext:
  fsGroup: 1000

# Container security context
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

# Liveness probe
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5
  successThreshold: 1

# Readiness probe
readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5
  successThreshold: 1

# Extra environment variables
extraEnv: []

# Extra volumes
extraVolumes: []

# Extra volume mounts
extraVolumeMounts: []

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Metrics exporter sidecar
metrics:
  enabled: false
  image:
    repository: oliver006/redis_exporter
    tag: v1.55.0
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

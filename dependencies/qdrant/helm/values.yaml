# Default values for Qdrant
replicaCount: 1

image:
  repository: qdrant/qdrant
  tag: v1.7.4
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Qdrant configuration
qdrant:
  # API key for authentication (leave empty to disable)
  apiKey: ""
  # Existing secret with api-key key
  existingSecret: ""
  # Enable CORS
  enableCors: true
  # gRPC port
  grpcPort: 6334
  # Performance tuning
  storage:
    # Optimize for storage efficiency vs speed
    optimizers:
      # Default segment threshold
      defaultSegmentNumber: 2
      # Max segment size in KB
      maxSegmentSize: 200000
    # Write-ahead log configuration
    wal:
      walCapacityMb: 32
      walSegmentsAhead: 0

# Service configuration
service:
  type: ClusterIP
  httpPort: 6333
  grpcPort: 6334
  annotations: {}

# Persistence configuration
persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  annotations: {}

# Resource limits and requests
resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 250m
    memory: 512Mi

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Pod security context
podSecurityContext:
  fsGroup: 1000

# Container security context
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

# Liveness probe
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5
  successThreshold: 1

# Readiness probe
readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5
  successThreshold: 1

# Extra environment variables
extraEnv: []

# Extra volumes
extraVolumes: []

# Extra volume mounts
extraVolumeMounts: []

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Metrics/telemetry
metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
